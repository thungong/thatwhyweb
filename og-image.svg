<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070d1a"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <radialGradient id="g1" cx="78%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="22%" cy="78%" r="45%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Watermark "?" — ties back to brand & favicon -->
  <text x="1080" y="560" font-family="Arial, Helvetica, sans-serif" font-size="560" font-weight="700"
        fill="white" fill-opacity="0.03" text-anchor="middle">?</text>

  <!-- Headline -->
  <text x="600" y="230" font-family="Arial, Helvetica, sans-serif" font-size="100" font-weight="700"
        fill="#ffffff" text-anchor="middle">Hi, I'm Aey.</text>

  <!-- Tagline -->
  <text x="600" y="322" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="400"
        fill="rgba(255,255,255,0.52)" text-anchor="middle">I work in IT and spend way too much time</text>
  <text x="600" y="370" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="400"
        fill="rgba(255,255,255,0.52)" text-anchor="middle">building random things on the internet.</text>

  <!-- Divider -->
  <line x1="500" y1="448" x2="700" y2="448" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Domain -->
  <text x="600" y="518" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600"
        fill="#38bdf8" text-anchor="middle">thatwhy.me</text>
</svg>
